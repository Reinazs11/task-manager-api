name: CI

# Runs on every push to main and to feature branches, and on every PR to main.
# Covers: build → unit tests → integration tests (real PostgreSQL via
# Testcontainers) → JaCoCo coverage gate at 80%.
on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

# Cancel an in-progress run of the same branch when a new commit is pushed,
# so we don't waste runner minutes on stale builds.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, test and check coverage
    runs-on: ubuntu-latest
    # dorny/test-reporter needs write access to publish check runs.
    permissions:
      checks: write
      # Pull request payloads are read-only by default in forked PRs; keep contents read.
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          # Cache Maven dependencies keyed on pom.xml — speeds up runs after
          # the first one significantly.
          cache: maven

      - name: Build, run all tests, enforce 80% coverage gate
        env:
          # Testcontainers needs to know it's running in CI so it binds to the
          # right network interface on the runner.
          TESTCONTAINERS_RYUK_DISABLED: 'true'
        # Use the Maven Wrapper (./mvnw) so the build uses the exact Maven
        # version pinned in .mvn/wrapper/maven-wrapper.properties, regardless
        # of what's installed on the runner.
        run: ./mvnw -B -ntp clean verify

      - name: Publish test results
        # Renders each test as a check-run annotation on the PR UI. Reads both
        # Surefire (unit) and Failsafe (integration) XML reports. Runs on success
        # AND failure so a red build still shows which tests failed inline.
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test results
          path: target/(surefire|failsafe)-reports/TEST-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Run scoped PIT mutation testing (domain layer)
        # Mutation testing verifies the tests actually catch bugs by injecting
        # small faults into bytecode. We scope it to the domain layer (~1 min)
        # — running it across the whole project takes ~10 min for little added
        # value at this size. The domain is where invariants live, so it earns
        # the continuous check. Other layers can be tested on demand via
        # `-DtargetClasses=... -DtargetTests=...`.
        env:
          TESTCONTAINERS_RYUK_DISABLED: 'true'
        run: >
          ./mvnw -B -ntp -P pit test-compile
          org.pitest:pitest-maven:mutationCoverage
          -DtargetClasses=com.renan.taskmanager.tasks.domain.*
          -DtargetTests=com.renan.taskmanager.tasks.domain.*,com.renan.taskmanager.users.domain.*,com.renan.taskmanager.common.domain.*

      - name: Upload JaCoCo coverage report
        # Always upload, even on failure — a failing build is exactly when you
        # most want to look at what the tests did.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Upload PIT mutation report
        # Produced by the scoped PIT step above.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-report-domain
          path: target/pit-reports/
          retention-days: 7

spring:
  application:
    name: task-manager-api

  # Profile padrão: development. Sobrescrever via env SPRING_PROFILES_ACTIVE.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskmanager}
    username: ${DB_USER:taskmanager}
    password: ${DB_PASSWORD:taskmanager}
    driver-class-name: org.postgresql.Driver

  jpa:
    # ddl-auto=none em todos os perfis. Schema controlado por Flyway/migrações.
    # Por enquanto usamos update só em dev; mudaremos quando adicionarmos Flyway.
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    open-in-view: false  # Anti-pattern: fecha sessão na view. Sempre false.
    properties:
      hibernate:
        format_sql: true
        jdbc.lob.non_contextual_creation: true

  docker:
    compose:
      enabled: false  # Gerenciamos via docker-compose manualmente.

server:
  port: ${SERVER_PORT:8080}

# Documentação OpenAPI
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method   # Group endpoints by HTTP verb in the UI
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json

# Configuração JWT (valores sensíveis vêm de variáveis de ambiente em prod)
app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLWRldmVsb3BtZW50LWp3dC1zZWNyZXQta2V5LWRvLW5vdC11c2UtaW4tcHJvZHVjdGlvbi1wbGVhc2U=}
    access-token-expiration-ms: 900000      # 15 minutos
    refresh-token-expiration-ms: 604800000  # 7 dias
  api:
    version: ${APP_VERSION:0.1.0}

logging:
  level:
    com.renan.taskmanager: INFO
    org.hibernate.SQL: WARN
    org.springframework: WARN

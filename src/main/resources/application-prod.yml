# Production profile overrides.
#
# Activated with SPRING_PROFILES_ACTIVE=prod. The default profile (dev) is
# optimized for local development; this file tightens the knobs that matter in
# production:
#   - Swagger UI and api-docs are DISABLED (internal docs must not leak).
#   - Hibernate runs validate-only in ALL profiles (dev included). Flyway owns
#     the schema end-to-end; Hibernate never mutates it.
#   - SQL formatting is off (noise reduction); SQL logs are WARN.
#   - CORS allowed-origins must be provided explicitly (no dev default here).
spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

app:
  cors:
    # No default: production MUST set CORS_ALLOWED_ORIGINS. If unset, the app
    # fails fast at startup rather than silently allowing any origin.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

logging:
  level:
    com.renan.taskmanager: INFO
    org.hibernate.SQL: WARN
    org.hibernate: WARN
    org.springframework: WARN
    org.apache: WARN

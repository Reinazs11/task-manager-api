# docker-compose.yml — Ambiente de desenvolvimento completo.
# Sobe PostgreSQL + a aplicação Task Manager API com um único comando.
#
# Uso:
#   docker compose up           # sobe tudo (Postgres + App)
#   docker compose up postgres  # sobe só o banco (útil para rodar app via IDE)
#   docker compose down         # para e remove containers
#   docker compose down -v      # para e APAGA os dados do banco

services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmanager-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskmanager}
      POSTGRES_USER: ${POSTGRES_USER:-taskmanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskmanager}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskmanager}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - taskmanager-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmanager-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-taskmanager}
      DB_USER: ${POSTGRES_USER:-taskmanager}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-taskmanager}
      SPRING_PROFILES_ACTIVE: dev
      # Default de desenvolvimento (mesma chave do application.yml). O .env
      # tem precedência — em produção, SEMPRE defina JWT_SECRET lá.
      JWT_SECRET: ${JWT_SECRET:-dGhpcy1pcy1hLWRldmVsb3BtZW50LWp3dC1zZWNyZXQta2V5LWRvLW5vdC11c2UtaW4tcHJvZHVjdGlvbi1wbGVhc2U=}
    ports:
      - "8080:8080"
    healthcheck:
      # Health probe do Actuator: retorna 200 quando o app responde e o BD está UP.
      # Mesma origem de verdade que o /actuator/health expõe — sem auth (ver SecurityConfig).
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - taskmanager-net

volumes:
  pgdata:

networks:
  taskmanager-net:
    driver: bridge
